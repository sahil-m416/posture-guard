<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PostureGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --bg: #0f0f13;
      --surface: #1a1a23;
      --surface2: #22222e;
      --text: #f0f0f5;
      --muted: #888;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #ffffff10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 14px;
    }

    .status-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      background: #ffffff15;
      color: var(--muted);
      transition: background 0.3s, color 0.3s;
    }

    .status-pill.active { background: #22c55e22; color: var(--good); }
    .status-pill.bad    { background: #ef444422; color: var(--bad); animation: blink 0.8s infinite; }

    @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

    /* Camera preview */
    .camera-section {
      position: relative;
      background: var(--surface);
      margin: 12px;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
    }

    #popup-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }

    #popup-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .camera-placeholder.hidden { display: none; }
    .camera-placeholder span { font-size: 2rem; }

    /* Posture status */
    .posture-status {
      margin: 0 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1.5px solid transparent;
      transition: border-color 0.3s;
    }

    .posture-status.good { border-color: var(--good); }
    .posture-status.bad  { border-color: var(--bad); }
    .posture-status.warn { border-color: var(--warn); }

    .ps-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .posture-status.good .ps-dot { background: var(--good); box-shadow: 0 0 6px var(--good); }
    .posture-status.bad  .ps-dot { background: var(--bad);  box-shadow: 0 0 6px var(--bad); animation: blink 0.6s infinite; }
    .posture-status.warn .ps-dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink 1s infinite; }

    .ps-text strong { display: block; font-size: 13px; font-weight: 600; }
    .ps-text small  { color: var(--muted); font-size: 11px; }

    /* Score bar */
    .score-row {
      margin: 8px 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    .score-bar {
      flex: 1;
      height: 5px;
      background: #ffffff12;
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      width: 0%;
      background: var(--good);
      border-radius: 3px;
      transition: width 0.2s, background 0.3s;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 10px 12px;
    }

    .mini-stat {
      background: var(--surface);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .mini-stat-val { font-size: 16px; font-weight: 700; line-height: 1; }
    .mini-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      margin: 0 12px 12px;
    }

    .btn {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #2a2a3a; }

    /* Footer link */
    .footer {
      padding: 8px 12px 12px;
      display: flex;
      justify-content: center;
    }

    .footer a {
      color: var(--accent-light);
      font-size: 11px;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🧘 PostureGuard</div>
  <div class="status-pill" id="status-pill">Inactive</div>
</div>

<div class="camera-section">
  <video id="popup-video" autoplay playsinline muted></video>
  <canvas id="popup-canvas"></canvas>
  <div class="camera-placeholder" id="cam-placeholder">
    <span>📷</span>
    <p>Press Start to begin</p>
  </div>
</div>

<div class="posture-status" id="posture-status">
  <div class="ps-dot"></div>
  <div class="ps-text">
    <strong id="ps-title">Not monitoring</strong>
    <small id="ps-sub">Press start below</small>
  </div>
</div>

<div class="score-row">
  <span class="score-label">Risk</span>
  <div class="score-bar">
    <div class="score-fill" id="popup-score-fill"></div>
  </div>
</div>

<div class="stats-row">
  <div class="mini-stat">
    <div class="mini-stat-val" id="p-alerts">0</div>
    <div class="mini-stat-lbl">Alerts</div>
  </div>
  <div class="mini-stat">
    <div class="mini-stat-val" id="p-duration">0s</div>
    <div class="mini-stat-lbl">Session</div>
  </div>
  <div class="mini-stat">
    <div class="mini-stat-val" id="p-good-pct">—</div>
    <div class="mini-stat-lbl">Good %</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-primary" id="p-btn-start">▶ Start</button>
  <button class="btn btn-secondary" id="p-btn-calibrate" disabled>Calibrate</button>
  <button class="btn btn-secondary" id="p-btn-stop" disabled>■ Stop</button>
</div>

<div class="footer">
  <a href="#" id="open-full-app">Open full dashboard →</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="popup.js"></script>
</body>
</html>
